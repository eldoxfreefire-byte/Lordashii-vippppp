<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Our Telegram</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#ff0000;
    filter:blur(180px);
    animation:move 8s infinite alternate;
}

@keyframes move{
    from{transform:translate(-200px,-150px);}
    to{transform:translate(200px,150px);}
}

.card{
    position:relative;
    z-index:1;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:20px;
    background:rgba(20,20,20,.85);
    text-align:center;
    border:2px solid #ff0000;
    box-shadow:0 0 30px #ff0000;
}

.logo{
    font-size:60px;
}

h1{
    color:#ff2b2b;
    margin:15px 0;
}

p{
    color:#ddd;
    line-height:1.6;
    margin-bottom:25px;
}

.button{
    display:inline-block;
    padding:15px 35px;
    background:#ff0000;
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    font-size:20px;
    font-weight:bold;
    box-shadow:0 0 20px #ff0000;
    transition:.3s;
}

.button:hover{
    transform:scale(1.05);
    background:#d60000;
}

.footer{
    margin-top:25px;
    color:#888;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">
    <div class="IMG_20260702_175701_840.jpg">🚀</div>

    <h1>Join Our Telegram</h1>

    <p>Get the latest updates and announcements by joining our Telegram channel today.</p>

    <a href="https://t.me/+kNFkhDXZnPM1OTBl" class="button" target="_blank">
        JOIN NOW
    </a>

    <div class="footer">
        © 2026 All Rights Reserved
    </div>
</div>

</body>
</html>
